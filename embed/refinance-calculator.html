<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Refinance Calculator — ClearCalc</title>
<meta name="robots" content="noindex">
<style>
  :root{--brand:#0b7a5b;--brand2:#0a6bd1;--ink:#0f1b2d;--muted:#5b6b82;--line:#e6ecf3;}
  *{box-sizing:border-box;}
  html,body{margin:0;}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;color:var(--ink);background:#fff;line-height:1.5;}
  .w{max-width:480px;margin:0 auto;padding:16px;border:1px solid var(--line);border-radius:14px;}
  h1{font-size:18px;margin:0 0 12px;}
  .f{margin-bottom:10px;}
  .f label{display:block;font-weight:600;font-size:13px;margin-bottom:4px;}
  .in{display:flex;align-items:center;border:1px solid var(--line);border-radius:9px;overflow:hidden;}
  .in span{padding:0 10px;color:var(--muted);background:#f1f5f9;align-self:stretch;display:flex;align-items:center;border-right:1px solid var(--line);font-size:14px;}
  .in input{border:0;outline:0;padding:9px 10px;font-size:15px;width:100%;}
  .r2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .res{margin-top:12px;padding:12px;border-radius:10px;background:#f6f8fb;text-align:center;}
  .res .lbl{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;font-weight:600;}
  .res .big{font-size:30px;font-weight:800;color:var(--brand);margin-top:2px;}
  .stat{display:flex;justify-content:space-between;font-size:13px;padding:5px 2px;border-top:1px dashed var(--line);}
  .stat .v{font-weight:700;}
  .credit{text-align:center;margin-top:10px;font-size:12px;}
  .credit a{color:var(--brand2);text-decoration:none;font-weight:600;}
</style>
</head>
<body>
<div class="w">
  <h1>Refinance Calculator</h1>
  <div class="f"><label>Remaining balance</label><div class="in"><span>$</span><input id="balance" inputmode="decimal" value="260,000"></div></div>
  <div class="r2">
    <div class="f"><label>Current rate</label><div class="in"><input id="curRate" inputmode="decimal" value="7.5"><span>%</span></div></div>
    <div class="f"><label>Years left</label><div class="in"><input id="curYears" inputmode="numeric" value="27"><span>yrs</span></div></div>
  </div>
  <div class="r2">
    <div class="f"><label>New rate</label><div class="in"><input id="newRate" inputmode="decimal" value="6.0"><span>%</span></div></div>
    <div class="f"><label>New term</label><div class="in"><input id="newYears" inputmode="numeric" value="30"><span>yrs</span></div></div>
  </div>
  <div class="res">
    <div class="lbl">Monthly savings</div>
    <div class="big" id="r-save">$0</div>
  </div>
  <div class="stat"><span>Current payment</span><span class="v" id="r-cur">$0</span></div>
  <div class="stat"><span>New payment</span><span class="v" id="r-new">$0</span></div>
  <div class="stat"><span>Lifetime interest savings</span><span class="v" id="r-intsave">$0</span></div>
  <div class="credit"><a href="https://getclearcalc.com/refinance-calculator.html?utm_source=embed&utm_medium=widget" target="_blank" rel="noopener">Powered by ClearCalc</a></div>
</div>
<script src="https://getclearcalc.com/assets/analytics.js" async></script>
<script src="https://getclearcalc.com/assets/finance.js"></script>
<script>
var F = window.Finance;
var ids = ['balance','curRate','curYears','newRate','newYears'];
function calc(){
  var balance = F.parseNum(document.getElementById('balance').value);
  var curRate = F.parseNum(document.getElementById('curRate').value);
  var curYears = F.parseNum(document.getElementById('curYears').value);
  var newRate = F.parseNum(document.getElementById('newRate').value);
  var newYears = F.parseNum(document.getElementById('newYears').value);
  var c = F.refinanceCompare(balance, curRate, curYears, newRate, newYears);
  document.getElementById('r-save').textContent = F.fmtMoney(c.monthlySavings);
  document.getElementById('r-cur').textContent = F.fmtMoney(c.currentMonthly);
  document.getElementById('r-new').textContent = F.fmtMoney(c.newMonthly);
  document.getElementById('r-intsave').textContent = F.fmtMoney(c.interestSavings, {cents:false});
}
ids.forEach(function(id){ document.getElementById(id).addEventListener('input', calc); });
calc();
</script>
</body>
</html>
